start_one_time_mowing:
  name: Uruchom koszenie jednorazowe
  description: Uruchamia jednorazowe koszenie z wybranym czasem pracy, opcjonalnym koszeniem krawedzi i opcjonalna lista stref RTK.
  fields:
    entity_id:
      name: Kosiarka
      description: Encja kosiarki Worx Vision Cloud PLUS.
      required: true
      selector:
        entity:
          domain: lawn_mower
    runtime:
      name: Czas koszenia
      description: Czas koszenia jednorazowego w minutach. Ustaw 0 z wlaczonym koszeniem krawedzi, aby uruchomic tylko krawedzie.
      required: false
      default: 60
      selector:
        number:
          min: 0
          max: 120
          step: 1
          unit_of_measurement: min
          mode: slider
    edge_cut:
      name: Koszenie krawedzi
      description: Czy jednorazowe koszenie ma zawierac koszenie krawedzi.
      required: false
      default: false
      selector:
        boolean:
    zones:
      name: Strefy
      description: Opcjonalna lista identyfikatorow stref RTK, np. [1, 2]. Puste pole oznacza domyslne koszenie bez ograniczenia do konkretnych stref.
      required: false
      example:
        - 1
        - 2
      selector:
        object:

set_rtk_map_id:
  name: Ustaw identyfikator mapy RTK
  description: Recznie ustawia identyfikator mapy RTK w pamieci podrecznej, gdy Worx go nie wysyla. Znajdz ostatnia znana wartosc w historii encji "Mapa RTK" i wklej ja tutaj, aby natychmiast odblokowac kamere mapy i zalezne czujniki powierzchni/postepu bez czekania na chmure Worx.
  fields:
    entity_id:
      name: Kosiarka
      description: Encja kosiarki Worx Vision Cloud PLUS.
      required: true
      selector:
        entity:
          domain: lawn_mower
    map_id:
      name: Identyfikator mapy
      description: Znany identyfikator mapy RTK (UUID), np. z historii encji "Mapa RTK".
      required: true
      selector:
        text:
